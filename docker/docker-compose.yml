version: "3.8"

# econ-ml-platform
# Starts: FastAPI app, Prometheus, Grafana
#
# Run: docker compose up -d
# API:       http://localhost:8000
# API Docs:  http://localhost:8000/docs
# Prometheus:http://localhost:9090
# Grafana:   http://localhost:3000  (admin / admin)

services:

  # ── FastAPI application ─────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: econ-ml-api
    ports:
      - "8000:8000"
    environment:
      ENV:                    production
      PORT:                   "8000"
      WORKERS:                "2"
      MLFLOW_TRACKING_URI:    ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      POSTGRES_HOST:          ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT:          ${POSTGRES_PORT:-5432}
      POSTGRES_USER:          ${POSTGRES_USER}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD}
      POSTGRES_DB:            ${POSTGRES_DB}
      ALLOWED_ORIGINS:        "*"
    volumes:
      - ../app:/app/app:ro    # mount app code read-only (for development hot reload)
    networks:
      - ml_platform_network
      - econ_network          # share with econ-data-pipeline for PostgreSQL + MLflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: econ-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"    # allow config reload via POST /-/reload
    networks:
      - ml_platform_network
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: econ-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/econ-ml-platform.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ml_platform_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  ml_platform_network:
    driver: bridge
  econ_network:
    external: true
    name: econ-data-pipeline_default
